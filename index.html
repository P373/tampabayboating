<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Tampa Bay Boating">
    <title>Tampa Bay Boating</title>
    <!-- Link to Google Fonts for stylish text (optional) -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- Link to Font Awesome for social media icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background-color: #000000;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        header {
            background: url('https://scontent-lga3-3.xx.fbcdn.net/v/t39.30808-6/656117719_1513608610767289_4568940876765364945_n.jpg?_nc_cat=104&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=3KzNWiVZkPkQ7kNvwHz7d2O&_nc_oc=AdoB2Gnxs5GsL4BnAEXFGCqLn3xc-gQs8T8apILsF-FVYgbOz_K0DbjQmfA9r7jBIug&_nc_zt=23&_nc_ht=scontent-lga3-3.xx&_nc_gid=8A5Pl5R_hUM4I7_PYpXmzg&_nc_ss=7a389&oh=00_Af00pwo7w1WOKs51gQB7shL3pGTCvQG8zFCB69U6DYOUsQ&oe=69E946AE') no-repeat top center/cover;
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            text-align: center;
            color: white;
            position: relative;
        }
        header::after {
            content: '';
            background: rgba(0, 0, 0, 0.5);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }
        header h1 {
            font-size: 3rem;
            z-index: 1;
            margin: 0;
        }
        .social-links {
            z-index: 1;
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        .social-links a {
            color: white;
            font-size: 2rem;
            text-decoration: none;
        }
        .social-links a:hover {
            color: #00aaff;
        }
        .container {
            text-align: center;
            padding: 50px;
        }
        @media (max-width: 768px) {
            header h1 {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>Tampa Bay Boating</h1>
        <div class="social-links">
            <a href="https://www.facebook.com/Tampabayboating"><i class="fab fa-facebook"></i></a>
            <a href="https://www.instagram.com/tampabayboating" ><i class="fab fa-instagram"></i></a>
            <a href="https://www.tiktok.com/@tampabayboating"><i class="fab fa-tiktok"></i></a>
        </div>
    </header>

</body>
</html>
